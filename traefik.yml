log:
  level: INFO

accessLog:
  bufferingSize: 100

api:
  dashboard: false

entryPoints:
  web:
    address: ":80"
    http:
      redirections:
        entryPoint:
          to: websecure
          scheme: https

  websecure:
    address: ":443"
    http:
      middlewares:
        - default-rate-limit@file

certificatesResolvers:
  letsencrypt:
    acme:
      email: support@timero.me
      storage: /etc/traefik/acme/acme.json
      httpChallenge:
        entryPoint: web

providers:
  docker:
    endpoint: "unix:///var/run/docker.sock"
    exposedByDefault: false
    network: traefik_public
  file:
    filename: /etc/traefik/dynamic.yml
    watch: true
